name: nutrition-env
description: >
  A simplified nutritional decision-making environment where an agent selects foods
  to reach a daily calorie target while avoiding overeating or undernutrition.

version: 1.0.0

tasks:
  - name: easy
    max_steps: 10
    grader: my_env.tasks:easy_grader

  - name: medium
    max_steps: 10
    grader: my_env.tasks:medium_grader

  - name: hard
    max_steps: 10
    grader: my_env.tasks:hard_grader

reward_range:
  min: 0.0
  max: 1.0

observation_space:
  calories_consumed: float
  calorie_target: float
  hunger: float
  step: int

action_space:
  food: string

metadata:
  author: "Ayush Saun"
  difficulty: ["easy", "medium", "hard"]
