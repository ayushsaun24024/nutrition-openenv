name: nutrition-env
description: >
  A simplified nutritional decision-making environment where an agent selects foods
  to reach a daily calorie target while avoiding overeating or undernutrition.

version: 1.0.0

tasks:
  - name: easy
    description: Reach the target calorie intake.
    max_steps: 10
    grader: my_env.tasks.EasyTask

  - name: medium
    description: Reach calorie target efficiently with fewer steps.
    max_steps: 10
    grader: my_env.tasks.MediumTask

  - name: hard
    description: Reach calorie target precisely without overshooting.
    max_steps: 10
    grader: my_env.tasks.HardTask

reward_range: [0.0, 1.0]

observation_space:
  calories_consumed: float
  calorie_target: float
  hunger: float
  step: int

action_space:
  food: string

metadata:
  author: "Ayush Saun"
  difficulty: ["easy", "medium", "hard"]
